# 简化的Mosquitto配置文件 - 支持外部连接
# =========================================

# 监听所有网络接口的1883端口
listener 1883 0.0.0.0

# 允许匿名连接（无需用户名密码）
allow_anonymous true

# 启用连接日志
connection_messages true

# 启用时间戳日志
log_timestamp true

# 日志类型
log_type error
log_type warning
log_type notice
log_type information

# 最大连接数
max_connections 100

# 持久化设置
persistence true
persistence_location ./
persistence_file mosquitto.db

# 自动保存间隔（秒）
autosave_interval 180