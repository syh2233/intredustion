<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史数据中心 - ESP32火灾报警系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1><i class="fas fa-history"></i> 历史数据中心</h1>
            <p>主从机传感器历史数据分析和可视化</p>
            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> 返回主页</a>
            </div>
        </header>

        <!-- 数据筛选控制面板 -->
        <section class="filter-section">
            <div class="filter-container">
                <div class="filter-group">
                    <label for="time-range">时间范围:</label>
                    <select id="time-range" class="filter-select">
                        <option value="1">最近1小时</option>
                        <option value="6">最近6小时</option>
                        <option value="12">最近12小时</option>
                        <option value="72" selected>最近72小时</option>
                        <option value="48">最近48小时</option>
                        <option value="168">最近7天</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="device-type">设备类型:</label>
                    <select id="device-type" class="filter-select">
                        <option value="all" selected>所有设备</option>
                        <option value="master">主机</option>
                        <option value="slave">从机</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="device-id">特定设备:</label>
                    <select id="device-id" class="filter-select">
                        <option value="">所有设备</option>
                    </select>
                </div>

                <div class="filter-group">
                    <button id="refresh-btn" class="refresh-btn">
                        <i class="fas fa-sync-alt"></i> 刷新数据
                    </button>
                </div>
            </div>
        </section>

        
        <!-- 历史数据详细记录 -->
        <section class="history-records-section">
            <h2><i class="fas fa-list"></i> 历史数据详细记录</h2>

            <div class="records-controls">
                <div class="records-info">
                    <span id="records-count">加载中...</span>
                    <span id="records-time-range"></span>
                </div>
                <div class="records-pagination">
                    <button id="prev-page-btn" disabled>
                        <i class="fas fa-chevron-left"></i> 上一页
                    </button>
                    <span id="page-info">第 1 页</span>
                    <button id="next-page-btn" disabled>
                        下一页 <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <div class="history-table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>设备ID</th>
                            <th>设备类型</th>
                            <th>温度(°C)</th>
                            <th>烟雾水平</th>
                            <th>火焰值</th>
                            <th>湿度(%)</th>
                            <th>光照</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <!-- 历史数据记录将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 历史统计摘要 -->
        <section class="system-stats">
            <h2><i class="fas fa-chart-pie"></i> 历史统计摘要</h2>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-database"></i>
                    </div>
                    <div class="stat-content">
                        <h4>数据记录总数</h4>
                        <p class="stat-value" id="total-records">--</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-thermometer-half"></i>
                    </div>
                    <div class="stat-content">
                        <h4>平均温度</h4>
                        <p class="stat-value" id="avg-temperature">--°C</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-smoking"></i>
                    </div>
                    <div class="stat-content">
                        <h4>平均烟雾水平</h4>
                        <p class="stat-value" id="avg-smoke">--</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="stat-content">
                        <h4>报警次数</h4>
                        <p class="stat-value" id="total-alarms">--</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-temperature-high"></i>
                    </div>
                    <div class="stat-content">
                        <h4>最高温度</h4>
                        <p class="stat-value" id="max-temperature">--°C</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-fire"></i>
                    </div>
                    <div class="stat-content">
                        <h4>平均火焰值</h4>
                        <p class="stat-value" id="avg-flame">--</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 统一底部导航栏 -->
    {% include 'navigation.html' %}

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
